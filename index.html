<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitch Chat Game</title>
    <link rel="stylesheet" href="style.css">
    <script type="importmap">
    {
        "imports": {
            "tmi.js": "https://esm.sh/tmi.js"
        }
    }
    </script>
</head>
<body>
    <div id="connect-container">
        <h1>Twitch Chat Game</h1>
        <p>Enter a Twitch channel name to connect to its chat.</p>
        <div class="input-group">
            <input type="text" id="channel-input" placeholder="e.g., ninja">
            <button id="connect-btn">Connect</button>
        </div>
    </div>

    <div id="world-select-container" class="hidden">
        <h1 id="world-select-title">Select a World</h1>
        <div id="world-list"></div>
        <div id="create-world-btn" class="world-item new-world">
            <div class="plus-icon">+</div>
            <p>Create New World</p>
        </div>
    </div>

    <div id="game-container" class="hidden">
        <canvas id="game-canvas"></canvas>
    </div>

    <script type="module" src="main.js"></script>

</body>
</html>
